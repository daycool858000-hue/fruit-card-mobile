<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="阿怡水果報價">
<title>阿怡水果報價｜手機版</title>
<style>
:root{--bg:#f4efe8;--card:#fffdfa;--ink:#2d2823;--muted:#7a7068;--line:#ded2c5;--brown:#8f5738;--brown2:#6c3c24;--cream:#eee3d7;--green:#dfe9dd;--warn:#fff1d5}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif}
body{padding-bottom:110px}
.wrap{max-width:760px;margin:auto;padding:14px}
h1{font-size:26px;margin:5px 0 3px}
.sub{font-size:14px;color:var(--muted);margin-bottom:12px}
.notice{background:#fff4d8;border:1px solid #e8cf91;border-radius:14px;padding:12px;margin-bottom:12px;font-size:14px;line-height:1.6}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:12px;margin-bottom:12px;box-shadow:0 8px 24px rgba(60,40,25,.06)}
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tab{border:0;border-radius:13px;padding:14px 10px;background:var(--cream);font-size:17px;font-weight:900;color:var(--ink)}
.tab.active{background:var(--brown);color:#fff}
.search{width:100%;border:1px solid var(--line);border-radius:12px;padding:13px 14px;font-size:17px;background:#fff;color:var(--ink)}
.category{margin:14px 2px 7px;font-size:15px;font-weight:900;color:var(--brown2)}
.product{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;margin-bottom:10px}
.product-title{padding:13px 14px;font-size:18px;font-weight:900;background:#faf5ee}
.row{display:grid;grid-template-columns:52px 1fr 105px;grid-template-areas:"check spec price" "check grade price";gap:7px 9px;align-items:center;padding:12px;border-top:1px solid #eee4da}
.check-wrap{grid-area:check;display:flex;align-items:center;justify-content:center}
.check{appearance:none;-webkit-appearance:none;width:38px;height:38px;border:2px solid #bda998;border-radius:11px;background:#fff;position:relative}
.check:checked{background:var(--brown);border-color:var(--brown)}
.check:checked:after{content:"✓";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:white;font-size:27px;font-weight:900}
.spec{grid-area:spec;font-size:17px;font-weight:900}
.grade{grid-area:grade;width:100%;border:1px solid var(--line);border-radius:10px;padding:10px;font-size:16px;background:white;color:var(--ink)}
.money{grid-area:price;position:relative}
.money input{width:100%;border:1px solid var(--line);border-radius:10px;padding:15px 31px 15px 10px;font-size:18px;background:var(--warn);color:var(--ink);text-align:right}
.money span{position:absolute;right:9px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--muted)}
.output{width:100%;min-height:220px;border:1px solid var(--line);border-radius:13px;padding:13px;font-size:16px;line-height:1.8;background:#fff;color:var(--ink);resize:vertical}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn{border:0;border-radius:12px;padding:13px;font-size:16px;font-weight:900;background:var(--cream);color:var(--ink)}
.btn.primary{background:var(--brown);color:#fff}
.btn.danger{background:#f2dddd;color:#97392f}
.fixed{position:fixed;left:0;right:0;bottom:0;background:rgba(244,239,232,.96);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:10px 14px calc(10px + env(safe-area-inset-bottom))}
.fixed-inner{max-width:760px;margin:auto;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fixed .btn{padding:15px;font-size:17px}
.status{min-height:22px;padding-top:7px;font-size:14px;font-weight:800;color:var(--brown2)}
.empty{padding:30px;text-align:center;color:var(--muted)}
@media (min-width:680px){.row{grid-template-columns:52px 1fr 140px 130px;grid-template-areas:"check spec grade price"}}
</style>
</head>

<strong>手機網頁版：</strong>直接勾選規格、選等級、輸入價格。資料會保存在這支手機的 Safari；按分享後選「加入主畫面」，之後可像 App 一樣使用。

<div id="catalog"></div>

  </div>
</div>
</div>

<div class="fixed">

var prefixKey = "ayi_mobile_prefix_v4";
var state = {};

  var saved = localStorage.getItem(storageKey);
  if (saved) state = JSON.parse(saved) || {};
} catch(e) {}

var catalog = document.getElementById("catalog");
var output = document.getElementById("output");
var search = document.getElementById("search");
var prefix = document.getElementById("prefix");
var status = document.getElementById("status");
var tabDomestic = document.getElementById("tabDomestic");
var tabImported = document.getElementById("tabImported");

try {
  var savedPrefix = localStorage.getItem(prefixKey);
  if (savedPrefix !== null) prefix.value = savedPrefix;
} catch(e) {}

function esc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function key(type,name,spec) {
  return type + "||" + name + "||" + spec;
}

function getItem(type,item,spec) {
  var k = key(type,item.name,spec);
  if (!state[k]) state[k] = {checked:false,grade:item.grades[0],price:""};
  return state[k];
}

function save() {
  try {
    localStorage.setItem(storageKey, JSON.stringify(state));
    localStorage.setItem(prefixKey, prefix.value);
  } catch(e) {}
}

function flash(msg) {
  status.textContent = msg;
  window.clearTimeout(window._ayiTimer);
  window._ayiTimer = window.setTimeout(function(){status.textContent="";},1800);
}

function render() {
  var q = (search.value || "").trim().toLowerCase();
  var list = DATA[current];
  var html = "";
  var lastCat = "";
  var found = 0;

  for (var i=0;i<list.length;i++) {
    var item = list[i];
    if (q && item.name.toLowerCase().indexOf(q) === -1 && item.category.toLowerCase().indexOf(q) === -1) continue;
    found++;
    if (item.category !== lastCat) {
      html += '<div class="category">' + esc(item.category) + '</div>';
      lastCat = item.category;
    }
    html += '<div class="product"><div class="product-title">' + esc(item.name) + '</div>';
    for (var j=0;j<item.specs.length;j++) {
      var spec = item.specs[j];
      var s = getItem(current,item,spec);
      html += '<div class="row" data-k="' + esc(key(current,item.name,spec)) + '">' +
        '<div class="check-wrap"><input class="check" type="checkbox"' + (s.checked ? ' checked' : '') + '></div>' +
        '<div class="spec">' + esc(spec) + '</div>' +
        '<select class="grade">';
      for (var g=0;g<item.grades.length;g++) {
        html += '<option' + (s.grade === item.grades[g] ? ' selected' : '') + '>' + esc(item.grades[g]) + '</option>';
      }
      html += '</select>' +
        '<div class="money"><input class="price" type="number" inputmode="numeric" pattern="[0-9]*" min="0" placeholder="價格" value="' + esc(s.price) + '"><span>元</span></div>' +

    }
    html += '</div>';
  }

  catalog.innerHTML = found ? html : '<div class="card empty">找不到符合的水果</div>';
  bindRows();
}

      var grade = row.querySelector(".grade");
      var price = row.querySelector(".price");

      check.addEventListener("change", function(){
        state[k].checked = check.checked;
        save();
        generate();
      });

      grade.addEventListener("change", function(){
        state[k].grade = grade.value;
        save();
        generate();
      });

      price.addEventListener("input", function(){
        state[k].price = price.value;
        if (price.value !== "" && !check.checked) {
          check.checked = true;
          state[k].checked = true;
        }
        save();
        generate();
      });
    })(rows[i]);
  }
}

function generate() {
  var sections = [];
  var types = ["domestic","imported"];
  for (var t=0;t<types.length;t++) {
    var type = types[t];
    var lines = [];
    var list = DATA[type];
    for (var i=0;i<list.length;i++) {
      var item = list[i];
      for (var j=0;j<item.specs.length;j++) {
        var spec = item.specs[j];
        var s = getItem(type,item,spec);
        if (s.checked && s.price !== "") {
          lines.push(item.name + "｜" + s.grade + "｜" + spec + "｜" + s.price + "元");
        }
      }
    }
    if (lines.length) {
      sections.push((type === "domestic" ? "【台產水果】" : "【進口水果】") + "\n" + lines.join("\n"));
    }
  }
  var p = (prefix.value || "").trim();
  output.value = (p ? p + (sections.length ? "\n\n" : "") : "") + sections.join("\n\n");
  save();
}

function switchType(type) {
  current = type;
  tabDomestic.className = "tab" + (type === "domestic" ? " active" : "");
  tabImported.className = "tab" + (type === "imported" ? " active" : "");
  render();
}

tabDomestic.addEventListener("click", function(){switchType("domestic");});
tabImported.addEventListener("click", function(){switchType("imported");});
search.addEventListener("input", render);
prefix.addEventListener("input", generate);

document.getElementById("refresh").addEventListener("click", function(){generate();flash("文字已更新");});

document.getElementById("copy").addEventListener("click", function(){
  generate();
  if (!output.value.trim()) {flash("請先勾選品項並輸入價格");return;}
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(output.value).then(function(){flash("已複製");}, fallbackCopy);
  } else {
    fallbackCopy();
  }
});

function fallbackCopy() {
  output.removeAttribute("readonly");
  output.focus();
  output.select();
  try {document.execCommand("copy");flash("已複製");} catch(e) {flash("請長按文字後複製");}
  output.setAttribute("readonly","readonly");
}

document.getElementById("clearPage").addEventListener("click", function(){
  var list = DATA[current];
  for (var i=0;i<list.length;i++) {
    for (var j=0;j<list[i].specs.length;j++) {
      var k = key(current,list[i].name,list[i].specs[j]);
      state[k] = {checked:false,grade:list[i].grades[0],price:""};
    }
  }
  save();render();generate();flash("此頁已清除");
});

document.getElementById("clearAll").addEventListener("click", function(){
  state = {};
  save();render();generate();flash("全部已清除");
});

render();
generate();
})();
</script>
</body>
</html>
