<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><title>阿怡水果報價｜可新增版</title><style>:root{--b:#8f5738;--bg:#f4efe8;--c:#fffdfa;--l:#ded2c5;--m:#786e65;--y:#fff1d5;--r:#97392f}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:var(--bg);color:#2d2823;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC",sans-serif;padding-bottom:105px}.w{max-width:760px;margin:auto;padding:14px}h1{margin:4px 0;font-size:26px}.sub,.hint{font-size:13px;color:var(--m);line-height:1.55}.card,.fruit{background:var(--c);border:1px solid var(--l);border-radius:16px;margin:11px 0;overflow:hidden}.card{padding:12px}.tabs,.acts,.foot{display:grid;grid-template-columns:1fr 1fr;gap:9px}button{border:0;border-radius:12px;padding:13px;font-size:16px;font-weight:900;background:#eee3d7;color:#2d2823}.on,.main{background:var(--b);color:#fff}.danger,.del{background:#f2dddd;color:var(--r)}input,select,textarea{width:100%;border:1px solid var(--l);border-radius:10px;padding:12px;font-size:16px;background:#fff;color:#2d2823}.search{font-size:17px}.cat{margin:14px 2px 7px;font-weight:900;color:#6c3c24}.title{padding:13px 14px;font-size:18px;font-weight:900;background:#faf5ee}.row{display:grid;grid-template-columns:46px 1fr 105px;grid-template-areas:"ck sp pr" "ck gr pr";gap:7px 9px;align-items:center;padding:11px;border-top:1px solid #eee4da}.ck{grid-area:ck;appearance:none;-webkit-appearance:none;width:36px;height:36px;border:2px solid #bda998;border-radius:10px;background:#fff;position:relative}.ck:checked{background:var(--b);border-color:var(--b)}.ck:checked:after{content:"✓";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:25px;font-weight:900}.sp{grid-area:sp;font-size:17px;font-weight:900}.gr{grid-area:gr}.pr{grid-area:pr;position:relative}.pr input{background:var(--y);text-align:right;padding-right:30px;font-size:18px}.pr i{position:absolute;right:9px;top:50%;transform:translateY(-50%);font-style:normal;font-size:13px;color:var(--m)}details summary{font-size:17px;font-weight:900;cursor:pointer;list-style:none}details summary::-webkit-details-marker{display:none}details summary:after{content:"＋";float:right;color:var(--b);font-size:21px}details[open] summary:after{content:"－"}.form{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:12px}.full{grid-column:1/-1}.field label{display:block;font-size:13px;font-weight:800;color:var(--m);margin:0 0 5px 2px}.custom{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:9px 0;border-top:1px solid #eee4da}.custom small{display:block;color:var(--m);margin-top:3px}.del{padding:9px 11px}.out{min-height:210px;line-height:1.75}.status{min-height:21px;padding-top:6px;color:#6c3c24;font-weight:900;font-size:14px}.fixed{position:fixed;left:0;right:0;bottom:0;background:rgba(244,239,232,.96);backdrop-filter:blur(12px);border-top:1px solid var(--l);padding:10px 14px calc(10px + env(safe-area-inset-bottom))}.foot{max-width:760px;margin:auto}.foot button{padding:15px}.loading{text-align:center;padding:30px;color:var(--m)}@media(max-width:480px){.form{grid-template-columns:1fr}.full{grid-column:auto}}@media(min-width:680px){.row{grid-template-columns:46px 1fr 140px 130px;grid-template-areas:"ck sp gr pr"}}</style></head><body><div class="w"><h1>阿怡水果報價</h1><div class="sub">固定品項直接選，找不到的水果與規格可以自己新增。</div><div class="card"><div class="tabs"><button id="td" class="on">台產水果</button><button id="ti">進口水果</button></div></div><div class="card"><input id="q" class="search" type="search" placeholder="搜尋水果名稱"><div id="status" class="status"></div></div><details class="card"><summary>新增品項或補上規格</summary><div class="form"><div class="field"><label>台產／進口</label><select id="type"><option value="domestic">台產水果</option><option value="imported">進口水果</option></select></div><div class="field"><label>分類</label><input id="cat" placeholder="例如：梨子"></div><div class="field full"><label>水果名稱</label><input id="name" placeholder="例如：東勢甜柿"></div><div class="field full"><label>規格（逗號或頓號分開）</label><input id="spec" placeholder="20顆、24顆、30顆"></div><div class="field full"><label>等級（逗號或頓號分開）</label><input id="grade" placeholder="特選、上選、一般"></div><button id="add" class="main full">儲存品項與規格</button></div><p class="hint">水果名稱已存在時，新規格會併入原品項。新增內容會保存在這支手機的 Safari。</p><strong>我新增的品項</strong><div id="custom"></div></details><div id="list"><div class="card loading">正在載入水果清單⋯</div></div><div class="card"><label><strong>開頭文字</strong></label><input id="prefix" value="今日水果報價"><br><br><label><strong>產生結果</strong></label><textarea id="out" class="out" readonly></textarea><br><br><div class="acts"><button id="clear">清除此頁</button><button id="clearAll" class="danger">全部清除</button></div></div></div><div class="fixed"><div class="foot"><button id="refresh">更新文字</button><button id="copy" class="main">一鍵複製</button></div></div><script>(function(){'use strict';var B={domestic:[],imported:[]},D={domestic:[],imported:[]},cur='domestic',S={},C={domestic:[],imported:[]};var K='ayi_mobile_fruit_v4',CK='ayi_custom_fruit_v2',PK='ayi_mobile_prefix_v4';var $=function(x){return document.getElementById(x)},list=$('list'),q=$('q'),status=$('status'),prefix=$('prefix'),out=$('out'),custom=$('custom');try{S=JSON.parse(localStorage.getItem(K)||'{}')||{}}catch(e){}try{C=JSON.parse(localStorage.getItem(CK)||'{"domestic":[],"imported":[]}')||C}catch(e){}try{var p=localStorage.getItem(PK);if(p!==null)prefix.value=p}catch(e){}function esc(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}function uniq(a){var r=[];for(var i=0;i<a.length;i++){var v=String(a[i]||'').trim();if(v&&r.indexOf(v)<0)r.push(v)}return r}function split(v){return uniq(String(v||'').split(/[、，,\n]+/))}function clone(x){return{category:x.category,name:x.name,specs:x.specs.slice(),grades:x.grades.slice()}}function ky(t,n,s){return t+'||'+n+'||'+s}function st(t,x,sp){var k=ky(t,x.name,sp);if(!S[k])S[k]={checked:false,grade:x.grades[0],price:''};if(x.grades.indexOf(S[k].grade)<0)S[k].grade=x.grades[0];return S[k]}function save(){try{localStorage.setItem(K,JSON.stringify(S));localStorage.setItem(CK,JSON.stringify(C));localStorage.setItem(PK,prefix.value)}catch(e){}}function flash(m){status.textContent=m;clearTimeout(window.ft);window.ft=setTimeout(function(){status.textContent=''},1800)}function rebuild(){D.domestic=B.domestic.map(clone);D.imported=B.imported.map(clone);['domestic','imported'].forEach(function(t){(C[t]||[]).forEach(function(a){var x=null;for(var i=0;i<D[t].length;i++)if(D[t][i].name===a.name){x=D[t][i];break}if(x){x.specs=uniq(x.specs.concat(a.specs||[]));x.grades=uniq(x.grades.concat(a.grades||[]))}else D[t].push({category:a.category||'其他',name:a.name,specs:uniq(a.specs||[]),grades:uniq(a.grades||['特選','上選','一般'])})})})}function renderCustom(){var h=[];['domestic','imported'].forEach(function(t){(C[t]||[]).forEach(function(a){h.push('<div class="custom"><div><b>'+esc(a.name)+'</b><small>'+(t==='domestic'?'台產':'進口')+'｜'+esc((a.specs||[]).join('、'))+'｜'+esc((a.grades||[]).join('、'))+'</small></div><button class="del" data-t="'+t+'" data-id="'+esc(a.id)+'">刪除</button></div>')})});custom.innerHTML=h.length?h.join(''):'<p class="hint">目前沒有自訂品項。</p>'}function render(){var z=(q.value||'').trim().toLowerCase(),a=D[cur],h='',last='',found=0;for(var i=0;i<a.length;i++){var x=a[i];if(z&&x.name.toLowerCase().indexOf(z)<0&&x.category.toLowerCase().indexOf(z)<0)continue;found++;if(last!==x.category){last=x.category;h+='<div class="cat">'+esc(last)+'</div>'}h+='<div class="fruit"><div class="title">'+esc(x.name)+'</div>';for(var j=0;j<x.specs.length;j++){var sp=x.specs[j],v=st(cur,x,sp);h+='<div class="row" data-k="'+esc(ky(cur,x.name,sp))+'"><input class="ck" type="checkbox"'+(v.checked?' checked':'')+'><div class="sp">'+esc(sp)+'</div><select class="gr">';for(var g=0;g<x.grades.length;g++)h+='<option'+(v.grade===x.grades[g]?' selected':'')+'>'+esc(x.grades[g])+'</option>';h+='</select><div class="pr"><input type="number" inputmode="numeric" min="0" placeholder="價格" value="'+esc(v.price)+'"><i>元</i></div></div>'}h+='</div>'}list.innerHTML=found?h:'<div class="card loading">找不到符合的水果</div>';bind()}function bind(){var r=list.querySelectorAll('.row');for(var i=0;i<r.length;i++)(function(x){var k=x.dataset.k,c=x.querySelector('.ck'),g=x.querySelector('.gr'),p=x.querySelector('.pr input');c.onchange=function(){S[k].checked=c.checked;save();gen()};g.onchange=function(){S[k].grade=g.value;save();gen()};p.oninput=function(){S[k].price=p.value;if(p.value!==''&&!c.checked){c.checked=true;S[k].checked=true}save();gen()}})(r[i])}function gen(){var sec=[];['domestic','imported'].forEach(function(t){var lines=[],a=D[t];for(var i=0;i<a.length;i++)for(var j=0;j<a[i].specs.length;j++){var sp=a[i].specs[j],v=st(t,a[i],sp);if(v.checked&&v.price!=='')lines.push(a[i].name+'｜'+v.grade+'｜'+sp+'｜'+v.price+'元')}if(lines.length)sec.push((t==='domestic'?'【台產水果】':'【進口水果】')+'\n'+lines.join('\n'))});var p=(prefix.value||'').trim();out.value=(p?p+(sec.length?'\n\n':''):'')+sec.join('\n\n');save()}function sw(t){cur=t;$('type').value=t;$('td').className=t==='domestic'?'on':'';$('ti').className=t==='imported'?'on':'';render()}$('td').onclick=function(){sw('domestic')};$('ti').onclick=function(){sw('imported')};q.oninput=render;prefix.oninput=gen;$('add').onclick=function(){var t=$('type').value,n=$('name').value.trim(),sp=split($('spec').value),gr=split($('grade').value),cat=$('cat').value.trim(),base=null;if(!n){flash('請輸入水果名稱');return}if(!sp.length){flash('請至少輸入一個規格');return}for(var i=0;i<B[t].length;i++)if(B[t][i].name===n){base=B[t][i];break}if(!gr.length)gr=base?base.grades.slice():['特選','上選','一般'];if(!cat)cat=base?base.category:'其他';var same=null;for(var j=0;j<C[t].length;j++)if(C[t][j].name===n){same=C[t][j];break}if(same){same.specs=uniq(same.specs.concat(sp));same.grades=uniq(same.grades.concat(gr));same.category=cat}else C[t].push({id:String(Date.now())+Math.random(),category:cat,name:n,specs:sp,grades:gr});save();rebuild();renderCustom();sw(t);gen();$('name').value=$('spec').value=$('grade').value=$('cat').value='';flash(base?'新規格已加入':'新水果已加入')};custom.onclick=function(e){var b=e.target.closest('.del');if(!b)return;var t=b.dataset.t,id=b.dataset.id,rem=null;C[t]=C[t].filter(function(x){if(x.id===id){rem=x;return false}return true});if(rem)(rem.specs||[]).forEach(function(sp){delete S[ky(t,rem.name,sp)]});save();rebuild();renderCustom();render();gen();flash('已刪除')};$('refresh').onclick=function(){gen();flash('文字已更新')};$('copy').onclick=function(){gen();if(!out.value.trim()){flash('請先選品項並輸入價格');return}function fb(){out.removeAttribute('readonly');out.select();try{document.execCommand('copy');flash('已複製')}catch(e){flash('請長按文字複製')}out.setAttribute('readonly','')}if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(out.value).then(function(){flash('已複製')},fb);else fb()};$('clear').onclick=function(){D[cur].forEach(function(x){x.specs.forEach(function(sp){S[ky(cur,x.name,sp)]={checked:false,grade:x.grades[0],price:''}})});save();render();gen();flash('此頁已清除')};$('clearAll').onclick=function(){S={};save();render();gen();flash('全部價格已清除')};fetch('../price/index.html?v=4').then(function(r){return r.text()}).then(function(s){var m=s.match(/var DATA = (\{[\s\S]*?\});\s*var current =/);if(!m)throw Error('no data');B=JSON.parse(m[1]);rebuild();renderCustom();render();gen()}).catch(function(){list.innerHTML='<div class="card loading">水果清單載入失敗，請重新整理。</div>'})})();</script></body></html>
